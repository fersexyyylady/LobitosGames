# .github/workflows/deploy.yml
# CI/CD con GitHub Actions — deploy automático a Railway/Render

name: CI/CD LobitosGames

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  # ── 1. Tests ──────────────────────────────────────────────────────────────
  test:
    name: Run Tests
    runs-on: ubuntu-latest

    services:
      mongodb:
        image: mongo:7
        ports:
          - 27017:27017

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: server/package-lock.json

      - name: Instalar dependencias
        working-directory: server
        run: npm ci

      - name: Verificar variables de entorno
        working-directory: server
        run: |
          echo "NODE_ENV=test" > .env
          echo "MONGO_URI=mongodb://127.0.0.1:27017/lobitosgames_test" >> .env
          echo "JWT_SECRET=test_secret_ci" >> .env
          echo "JWT_REFRESH_SECRET=test_refresh_ci" >> .env
          echo "PORT=5000" >> .env

      - name: Health check del servidor
        working-directory: server
        run: |
          node index.js &
          sleep 5
          curl -f http://localhost:5000/api/health || exit 1
          kill %1

  # ── 2. Build Docker ───────────────────────────────────────────────────────
  build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'

    steps:
      - uses: actions/checkout@v4

      - name: Login a Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build y Push imagen
        uses: docker/build-push-action@v5
        with:
          context: ./server
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/lobitosgames-backend:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/lobitosgames-backend:${{ github.sha }}

  # ── 3. Deploy a Railway ───────────────────────────────────────────────────
  deploy:
    name: Deploy to Railway
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'

    steps:
      - uses: actions/checkout@v4

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy a Railway
        working-directory: server
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: railway up --service backend

      - name: Verificar deploy
        run: |
          sleep 30
          curl -f ${{ secrets.PRODUCTION_URL }}/api/health || echo "Health check fallido — revisar logs"

      - name: Notificar resultado
        if: always()
        run: |
          echo "Deploy completado - Commit: ${{ github.sha }}"
          echo "Branch: ${{ github.ref_name }}"
          echo "Autor: ${{ github.actor }}"
