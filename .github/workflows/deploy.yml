# .github/workflows/deploy.yml
# CI/CD corregido — no requiere Docker Hub para correr el job de tests

name: CI/CD LobitosGames

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  # ── 1. Tests — siempre corre ────────────────────────────────────────────────
  test:
    name: Run Tests
    runs-on: ubuntu-latest

    services:
      mongodb:
        image: mongo:7
        ports:
          - 27017:27017

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: server/package-lock.json

      - name: Instalar dependencias
        working-directory: server
        run: npm install

      - name: Crear .env de prueba
        working-directory: server
        run: |
          cat > .env << 'EOF'
          NODE_ENV=test
          MONGO_URI=mongodb://127.0.0.1:27017/lobitosgames_test
          JWT_SECRET=test_secret_ci_2026
          JWT_REFRESH_SECRET=test_refresh_ci_2026
          PORT=5000
          CLIENT_ORIGIN=http://localhost:3000
          EOF

      - name: Arrancar servidor y verificar health check
        working-directory: server
        run: |
          node index.js &
          SERVER_PID=$!
          echo "Servidor PID: $SERVER_PID"
          sleep 8
          echo "Verificando /api/health..."
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:5000/api/health)
          echo "Status code: $STATUS"
          if [ "$STATUS" = "200" ]; then
            echo "✅ Health check OK"
          else
            echo "❌ Health check falló con status $STATUS"
            kill $SERVER_PID 2>/dev/null || true
            exit 1
          fi
          kill $SERVER_PID 2>/dev/null || true

  # ── 2. Build Docker — solo en main/master y si los tests pasaron ────────────
  build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: test
    # Solo corre si hay secrets de Docker Hub configurados Y estamos en main
    if: |
      (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master') &&
      vars.DOCKER_ENABLED == 'true'

    steps:
      - uses: actions/checkout@v4

      - name: Login a Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build y Push imagen
        uses: docker/build-push-action@v5
        with:
          context: ./server
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/lobitosgames-backend:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/lobitosgames-backend:${{ github.sha }}

  # ── 3. Deploy a Railway — solo si hay token configurado ────────────────────
  deploy:
    name: Deploy to Railway
    runs-on: ubuntu-latest
    needs: test
    if: |
      (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master') &&
      vars.RAILWAY_ENABLED == 'true'

    steps:
      - uses: actions/checkout@v4

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy a Railway
        working-directory: server
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: railway up --service backend

      - name: Verificar deploy en producción
        run: |
          sleep 30
          curl -f ${{ secrets.PRODUCTION_URL }}/api/health || echo "⚠️ Health check de producción falló — revisar logs en Railway"
